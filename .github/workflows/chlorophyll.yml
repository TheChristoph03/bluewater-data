name: Build chlorophyll proxy

# Daily scheduled run is ENABLED (secrets are set). `workflow_dispatch` also
# allows a manual run any time.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"      # daily 09:00 UTC — accounts for the gap-free NRT ~1–2 day latency

permissions:
  contents: write            # the job commits the regenerated JSON back to the repo
  issues: write              # the alarm step opens a dedup'd issue on failure

concurrency:
  group: chlorophyll
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10        # fail fast — a hung fetch should not run for 20 min
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build latest.json
        env:
          COPERNICUSMARINE_SERVICE_USERNAME: ${{ secrets.COPERNICUSMARINE_SERVICE_USERNAME }}
          COPERNICUSMARINE_SERVICE_PASSWORD: ${{ secrets.COPERNICUSMARINE_SERVICE_PASSWORD }}
        # On any validation failure the script exits non-zero, this step fails,
        # and the commit step below never runs — last-good latest.json is kept.
        run: python scripts/build_chlorophyll.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- chlorophyll/latest.json; then
            echo "No change in latest.json — nothing to commit."
            exit 0
          fi
          git config user.name "bluewater-bot"
          git config user.email "actions@users.noreply.github.com"
          git add chlorophyll/latest.json
          git commit -m "chlorophyll: update latest.json ($(date -u +%Y-%m-%d))"
          git push

      # Secondary alarm (GitHub already emails the owner on a failed scheduled
      # run). Opens an issue once and dedups by exact title so a multi-day outage
      # doesn't spam — close the issue when fixed and it can re-open.
      - name: Alarm on failure (dedup by title)
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="chlorophyll proxy build failing"
          EXISTING=$(gh issue list --state open --search "$TITLE in:title" \
            --json number,title --jq ".[] | select(.title==\"$TITLE\") | .number" | head -1)
          if [ -n "$EXISTING" ]; then
            echo "Issue #$EXISTING already open — not duplicating."
          else
            gh issue create --title "$TITLE" --body \
              "Scheduled chlorophyll proxy build failed at $(date -u +%Y-%m-%dT%H:%MZ). Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}. The last-good latest.json was NOT overwritten (fail-don't-overwrite). Close this issue once fixed." \
              || echo "issue create failed (non-fatal)"
          fi
