name: Build currents proxy

# Daily schedule ships DISABLED pending review + CI verification (slice 5.2c). To enable:
# uncomment the `schedule:` block (secrets already exist — reused from the other proxies).
on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 10 * * *"   # daily 10:00 UTC — offset from chlorophyll (09:00) + subsurface (09:30)

permissions:
  contents: write
  issues: write

concurrency:
  group: currents
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build latest.json
        env:
          COPERNICUSMARINE_SERVICE_USERNAME: ${{ secrets.COPERNICUSMARINE_SERVICE_USERNAME }}
          COPERNICUSMARINE_SERVICE_PASSWORD: ${{ secrets.COPERNICUSMARINE_SERVICE_PASSWORD }}
        run: python scripts/build_currents.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- currents/latest.json; then
            echo "No change in currents/latest.json — nothing to commit."
            exit 0
          fi
          git config user.name "bluewater-bot"
          git config user.email "actions@users.noreply.github.com"
          git add currents/latest.json
          git commit -m "currents: update latest.json ($(date -u +%Y-%m-%d))"
          git push

      - name: Alarm on failure (dedup by title)
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="currents proxy build failing"
          EXISTING=$(gh issue list --state open --search "$TITLE in:title" \
            --json number,title --jq ".[] | select(.title==\"$TITLE\") | .number" | head -1)
          if [ -n "$EXISTING" ]; then
            echo "Issue #$EXISTING already open — not duplicating."
          else
            gh issue create --title "$TITLE" --body \
              "Scheduled currents proxy build failed at $(date -u +%Y-%m-%dT%H:%MZ). Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}. The last-good latest.json was NOT overwritten. Close once fixed." \
              || echo "issue create failed (non-fatal)"
          fi
